name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Every job is read-only. Publishing is intentionally handled by no workflow in
# this repository, so neither id-token nor package write access is granted.
permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  lock:
    name: Reproducible dependency lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install the hashed CI environment
        run: python -m pip install --require-hashes -r requirements/ci.txt
      - name: Verify lock matches project metadata
        run: |
          # --python-version pins the resolution floor to the lowest version in the
          # test matrix. Without it the lock omits dependencies that only apply
          # below 3.12 (jaraco-context -> backports-tarfile) and --require-hashes
          # fails on 3.11. Keep this flag in sync with supply-chain.yml.
          uv pip compile pyproject.toml \
            --extra dev --extra calibration --extra release --extra supply-chain \
            --universal --python-version 3.11 --generate-hashes --no-annotate \
            -o requirements/ci.txt
          git diff --exit-code -- requirements/ci.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install the hashed CI environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Lint (ruff check)
        run: python -m ruff check src tests tools
      - name: Format check (ruff format)
        run: python -m ruff format --check src tests tools
      - name: Function documentation coverage
        run: python tools/check_function_docs.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install the hashed CI environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-deps --no-build-isolation -e .
          python -m pip check
      - name: Type check (mypy strict)
        run: python -m mypy
      - name: Tests (with coverage gate)
        run: python -m pytest -q --cov --cov-fail-under=85

  # Live regression gate: drive the suite against the reference target (which
  # validates with the real x402 SDK). No chain and no funds are used.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install the hashed CI environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Verify new features live against the reference target
        run: python tools/verify_new_features.py

  release-artifacts:
    name: Build and smoke-test distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install the hashed build environment
        run: python -m pip install --require-hashes -r requirements/ci.txt
      - name: Build wheel and source distribution
        run: python -m build --no-isolation
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - name: Install wheel into a clean environment and smoke-test the CLI
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --require-hashes -r requirements/ci.txt
          .wheel-venv/bin/python -m pip install --no-deps dist/*.whl
          .wheel-venv/bin/python -m pip check
          .wheel-venv/bin/x402-conformance version
          .wheel-venv/bin/x402-conformance explain RS-HS-001

  solidity:
    name: Solidity harness (Foundry v1.7.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
        with:
          version: v1.7.1
      - name: Compile pinned Solidity source
        working-directory: onchain
        run: forge build
      - name: Run Solidity harness tests
        working-directory: onchain
        run: forge test -vvv

  # Manual job (Actions tab -> Run workflow): calibrate active checks against
  # the verify-capable reference target. No chain and no funds are used.
  calibrate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci.txt
      - name: Install the hashed CI environment
        run: |
          python -m pip install --require-hashes -r requirements/ci.txt
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Calibrate RS-NEG against the reference target
        run: |
          python tools/calibration_target.py 4500 &
          sleep 2
          x402-conformance check http://127.0.0.1:4500/data --active
