name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Lint (ruff check)
        run: python -m ruff check src tests
      - name: Format check (ruff format)
        run: python -m ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev + evm extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Type check (mypy strict)
        run: python -m mypy
      - name: Tests (with coverage gate)
        run: python -m pytest -q --cov --cov-fail-under=85

  # Live regression gate: drive the suite against the reference target (which
  # validates with the REAL x402 SDK) and assert each new check both PASSes a
  # correct server and CATCHes the matching bug. No chain, no funds.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,calibration]"
      - name: Verify new features live against the reference target
        run: python tools/verify_new_features.py

  # Manual job (Actions tab → Run workflow): calibrate the active checks against
  # the verify-capable reference target. No chain needed.
  calibrate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,calibration]"
      - name: Calibrate RS-NEG against the reference target
        run: |
          python tools/calibration_target.py 4500 &
          sleep 2
          x402-conformance check http://127.0.0.1:4500/data --active
