name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev + evm extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Type check (mypy strict)
        run: python -m mypy
      - name: Tests
        run: python -m pytest -q

  # Manual job (Actions tab → Run workflow): calibrate the active checks against
  # the verify-capable reference target. No chain needed.
  calibrate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Calibrate RS-NEG against the reference target
        run: |
          python tools/calibration_target.py 4500 &
          sleep 2
          x402-conformance check http://127.0.0.1:4500/data --active
